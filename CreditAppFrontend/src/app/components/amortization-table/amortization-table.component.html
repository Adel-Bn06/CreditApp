<table>
  <thead>
    <tr>
      <th>Mois</th>
      <th>Capital restant</th>
      <th>Intérêts</th>
      <th>Amortissement</th>
      <th>Mensualité</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let row of rows">
      <td>{{ row.Periode }}</td>
      <td>{{ row.SoldeDebut | number:'1.2-2' }}</td>
      <td>{{ row.Interet | number:'1.2-2' }}</td>
      <td>{{ row.CapitalRembourse | number:'1.2-2' }}</td>
      <td>{{ row.Mensualite | number:'1.2-2' }}</td>
    </tr>
  </tbody>
</table>
